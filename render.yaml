services:
  - type: web
    name: lawcrm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lawcrm-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true

databases:
  - name: lawcrm-db
    plan: free
