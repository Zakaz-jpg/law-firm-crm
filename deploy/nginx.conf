server {
    listen 80;
    server_name lawcrm.su www.lawcrm.su;
    return 301 https://lawcrm.su$request_uri;
}

server {
    listen 443 ssl;
    server_name lawcrm.su www.lawcrm.su;

    ssl_certificate /etc/letsencrypt/live/lawcrm.su/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lawcrm.su/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/lawcrm/frontend;
    index index.html;

    client_max_body_size 50M;

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        alias /var/www/lawcrm/backend/uploads/;
        expires 30d;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
